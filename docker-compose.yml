services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api-validator

  api-validator:
    image: node:20-alpine
    working_dir: /app
    command: node server.js
    environment:
      PORT: 3000
      CORS_ORIGIN: http://localhost
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - ./backend:/app
    ports:
      - "3000:3000"
